<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekonečná Poznávačka</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; min-height: auto; padding: 10px; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        img { 
			width: 100%; 
			height: 300px; /* Můžete zvětšit na 350px nebo 400px podle potřeby */
			border-radius: 15px; 
			object-fit: contain; /* TATO ZMĚNA zajistí, že bude vidět celý obrázek */
			margin-bottom: 1rem; 
			background: #fdfdfd; /* Jemné pozadí, kdyby byl obrázek úzký */
		}
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #c297cf; }
        button { width: 100%; background: #c297cf; color: #2d3436; border: none; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #msg { margin-top: 15px; font-weight: bold; min-height: 50px; }
        #info { color: gray; font-size: 0.8rem; margin-top: 10px; }
		.card { 
			display: flex; 
			flex-direction: column; 
			gap: 10px; /* Vytvoří stejné mezery mezi prvky */
		}
		#msg { 
			margin: 0; 
			padding: 10px 0;
			order: 1; /* Zpráva bude úplně nahoře */
		}
		#info { 
			order: 2; /* Info o pokusech bude pod zprávou */
		}
		#pic { 
			order: 3; /* Obrázek pod info texty */
		}
		#input-area {
			order: 4; /* Vstupní pole a tlačítko úplně dole */
		}
        .back-link {
            display: block; /* Zajistí, že odkaz zabere celou šířku a umožní zarovnání */
            text-align: left; /* Tlačí text odkazu doleva */
            margin-bottom: 20px;
            text-decoration: none;
            color: #888;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="card">
    <a href="https://fierce-dog.github.io/poznavacky_linktree/" class="back-link">⬅ Zpět na rozcestí</a>
    <p id="msg">Máš 3 pokusy</p>
    <p id="info"></p>
    <img id="pic" src="" alt="Načítám...">
    <div id="input-area">
        <input type="text" id="guess" placeholder="Co je to za psa?" autocomplete="off" onkeypress="if(event.key === 'Enter') check()">
        <button onclick="check()">Odeslat</button>
    </div>
</div>

<script>
    // --- VAŠE DATA ---
    const items = [
        { file: "afgansky_chrt.jpg", name: "Afgánský chrt" },
        { file: "akita_inu.jpg", name: "Akita inu" },
        { file: "belgicky_ovcak_malinois.jpg", name: "Belgický ovčák Malinois" },
        { file: "bigl.jpg", name: "Bígl" },
        { file: "irsky_setr.jpg", name: "Irský setr" },
        { file: "jack_russell_terier.jpg", name: "Jack Russell teriér" },
        { file: "jezevcik_hladkosrsty.jpg", name: "Jezevčík hladkosrstý" },
        { file: "knirac_velky.jpg", name: "Knírač velký" },
        { file: "labradorsky_retrivr.jpg", name: "Labradorský retrívr" },
        { file: "papillon.jpg", name: "Papillon" }
    ];

    // --- GLOBÁLNÍ PROMĚNNÉ (nech si je nahoře nad funkcemi) ---
    let current;
    let attempts = 0;
    let pool = []; 
    let correctTotal = 0; 
    let shownTotal = 0; 

    function next() {
        const msgField = document.getElementById("msg");
        const inputField = document.getElementById("guess");

        // 1. KONTROLA KONCE KOLA
        if (pool.length === 0) {
            pool = [...items];
            correctTotal = 0; 
            shownTotal = 0;
            // Tuto hlášku uvidíš jen na zlomek vteřiny, než se vybere první zvíře
            msgField.innerText = "Začínáme nové kolo!";
            msgField.style.color = "purple";
        } else {
            msgField.innerText = "Poznej psa";
            msgField.style.color = "purple";
        }

        // 2. VÝBĚR NOVÉHO ZVÍŘETE
        attempts = 0; 
        const idx = Math.floor(Math.random() * pool.length);
        current = pool[idx];

        // 3. RESET POLÍ
        document.getElementById("pic").src = current.file;
        inputField.value = "";
        inputField.disabled = false;
        inputField.focus();
        
        // Smazal jsem odtud shownTotal++, aby se to nepřičítalo dopředu
        updateInfo();
    }

    function updateInfo() {
        const infoElement = document.getElementById("info");
        if (infoElement) {
            // Math.min(attempts + 1, 3) zajistí, že i při prohře zůstane v textu "3/3" a neskočí tam "4/3"
            const displayAttempts = Math.min(attempts + 1, 3);
            infoElement.innerText = `Skóre: ${correctTotal}/${shownTotal}/${items.length} | Zbývá v kole: ${pool.length} | Pokus: ${displayAttempts}/3`;
            infoElement.style.color = "#666";
        }
    }

    function check() {
        const inputField = document.getElementById("guess");
        const msgField = document.getElementById("msg");
        const val = inputField.value.trim().toLowerCase();
        const ans = current.name.toLowerCase();

        if (val === "" || inputField.disabled) return;

        if (val === ans) {
            // --- SCÉNÁŘ: UHODNUTO ---
            correctTotal++; // Bod nahoru
            shownTotal++;   // Úloha splněna
            
            msgField.innerHTML = `Správně!<br><span style="font-size: 21px;">${current.name}</span>`;
            msgField.style.color = "green";
            inputField.disabled = true;
            
            pool = pool.filter(i => i !== current);
            updateInfo(); // Překreslíme skóre na obrazovce
            setTimeout(next, 1500);

        } else {
            // --- SCÉNÁŘ: CHYBA ---
            attempts++;
            if (attempts < 3) {
                // Pořád máš pokusy
                msgField.innerText = `✗ Špatně, zkus to znovu!`;
                msgField.style.color = "orange";
                inputField.value = "";
                inputField.focus();
                updateInfo(); // Aktualizujeme jen číslo pokusu (1/3 -> 2/3)
            } else {
                // --- SCÉNÁŘ: PROHRA (PO 3. POKUSU) ---
                shownTotal++; // Úloha splněna (nepřidáváme bod do correctTotal)
                
                msgField.innerHTML = `Správně bylo:<br><span style="font-size: 21px;">${current.name}</span>`;
                msgField.style.color = "red";
                msgField.style.fontWeight = "bold";
                inputField.disabled = true;
                
                pool = pool.filter(i => i !== current);
                updateInfo(); // Překreslíme skóre
                setTimeout(next, 5000);
            }
        }
    }

    // Spuštění hry
    next();
</script>
</body>
</html>
